services:
  vault_vaultwarden:
    image: vaultwarden/server:1.30.1
    environment:
      SIGNUPS_ALLOWED: false
      INVITATION_ORG_NAME: ESN Germany
      DOMAIN: https://vault.${URL}
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_FROM: ${SMTP_FROM}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_SECURITY: ${SMTP_SECURITY}
      SMTP_PORT: ${SMTP_PORT}
    volumes:
      - ./data:/data
    profiles:
      - vault
    restart: unless-stopped

  vault_restic:
    build: ../platform
    hostname: vault_restic
    init: true
    labels:
      ofelia.enabled: true
      ofelia.job-exec.vault-backup.command: sh /scripts/backup.sh
      ofelia.job-exec.vault-backup.schedule: 0 3 * * *
      ofelia.job-exec.vault-prune.command: restic forget --keep-daily 7 --keep-weekly 4 --keep-monthly 12 --keep-yearly 3 --prune
      ofelia.job-exec.vault-prune.schedule: 0 15 * * *
    environment:
      RESTIC_REPOSITORY: ${BACKUP_REPOSITORY}/vault
      RESTIC_PASSWORD: ${BACKUP_PASSWORD}
    volumes:
      - ./data:/data
      - ../platform/data/restic:/restic-repo
      - ./restic:/scripts:ro
      - ${BACKUP_SSH_PRIVATE_KEY}:/root/.ssh/id_ed25519:ro
      - ${BACKUP_SSH_KNOWN_HOSTS}:/root/.ssh/known_hosts:ro
    profiles:
      - vault
    restart: unless-stopped

  vault_restic_exporter:
    image: ngosang/restic-exporter:1.7.0
    init: true
    environment:
      RESTIC_REPOSITORY: ${BACKUP_REPOSITORY}/vault
      RESTIC_PASSWORD: ${BACKUP_PASSWORD}
      REFRESH_INTERVAL: 3600
    volumes:
      - ../platform/data/restic:/restic-repo:ro
      - ${BACKUP_SSH_PRIVATE_KEY}:/root/.ssh/id_ed25519:ro
      - ${BACKUP_SSH_KNOWN_HOSTS}:/root/.ssh/known_hosts:ro
    profiles:
      - vault
    restart: unless-stopped
